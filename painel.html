<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapPedido — Painel da Loja</title>
<meta name="theme-color" content="#0A0A0A">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --brand: #FF4500;
    --brand-dark: #CC3700;
    --bg: #0A0A0A;
    --bg2: #141414;
    --bg3: #1C1C1C;
    --border: #222;
    --text: #F0F0F0;
    --text2: #888;
    --text3: #444;
    --green: #22C55E;
    --yellow: #F59E0B;
    --blue: #3B82F6;
    --purple: #A78BFA;
    --red: #EF4444;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #view-login {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 24px; padding: 36px 28px;
    width: 100%; max-width: 400px;
    animation: fadeIn 0.5s ease;
    text-align: center;
  }
  .login-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; margin-bottom: 4px; }
  .login-logo span { color: var(--brand); }
  .login-sub { color: var(--text2); font-size: 0.85rem; margin-bottom: 28px; }
  
  .btn-primary {
    background: linear-gradient(135deg, var(--brand), #FF6B35);
    color: white; border: none; border-radius: var(--radius);
    padding: 15px; width: 100%;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,69,0,0.3);
    margin-top: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,69,0,0.4); }

  /* HEADER DO PAINEL */
  header {
    background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; }
  .header-logo span { color: var(--brand); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .loja-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 50px; padding: 5px 12px; font-size: 0.78rem; color: var(--text2); }
  .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--text2);
    border-radius: 50px; padding: 6px 12px; font-size: 0.78rem; cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* PAINEL */
  #view-painel { display: none; }
  #view-painel.active { display: block; }

  .painel-tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
    background: var(--bg2);
  }
  .painel-tabs::-webkit-scrollbar { display: none; }
  .ptab {
    background: none; border: none; color: var(--text2);
    padding: 14px 20px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.88rem;
    position: relative; border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap; transition: color 0.2s;
  }
  .ptab.active { color: var(--brand); border-bottom-color: var(--brand); }

  .tab-content { display: none; padding: 20px; max-width: 840px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(min-width:500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    animation: fadeIn 0.4s ease;
  }
  .stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.7rem; color: var(--brand); }
  .stat-label { color: var(--text2); font-size: 0.75rem; margin-top: 4px; }

  /* PEDIDOS */
  .pedidos-list { display: flex; flex-direction: column; gap: 14px; }
  .pedido-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    transition: all 0.3s; animation: fadeIn 0.4s ease;
  }
  .pedido-card.novo { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand), 0 4px 24px rgba(255,69,0,0.15); }
  .pedido-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .pedido-id { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--brand); font-size: 1.05rem; }
  .status-pill { font-size: 0.72rem; font-weight: 700; padding: 4px 12px; border-radius: 50px; }
  .s-recebido { background: rgba(255,69,0,0.15); color: var(--brand); }
  .s-aceito { background: rgba(59,130,246,0.15); color: var(--blue); }
  .s-preparando { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .s-saiu { background: rgba(167,139,250,0.15); color: var(--purple); }
  .s-entregue { background: rgba(34,197,94,0.15); color: var(--green); }

  .pedido-cliente { font-size: 0.88rem; margin-bottom: 6px; }
  .pedido-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pedido-total { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--brand); font-size: 1.15rem; }

  .prod-rows { display: flex; flex-direction: column; gap: 10px; }
  .prod-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .prod-row-info { flex: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2); border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0; padding: 20px;
    width: 100%; max-width: 560px;
  }
  .form-input {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px; padding: 13px 14px;
    width: 100%; margin-bottom: 12px;
  }

  .loading { text-align: center; padding: 48px; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="view-login">
  <div class="login-box">
    <div class="login-logo">Zap<span>Pedido</span></div>
    <div class="login-sub">Clique abaixo para acessar o painel</div>
    <button class="btn-primary" onclick="fazerLogin()" id="btn-login">Entrar no Painel</button>
  </div>
</div>

<div id="view-painel">
  <header>
    <div class="header-logo">Zap<span>Pedido</span> <span style="font-size:0.7rem;color:var(--text3);font-weight:400">Painel</span></div>
    <div class="header-right">
      <div class="loja-badge" id="loja-nome-badge">Carregando...</div>
      <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <div class="painel-tabs">
    <button class="ptab active" onclick="abrirTab('pedidos')" id="tab-btn-pedidos">📋 Pedidos</button>
    <button class="ptab" onclick="abrirTab('cardapio')" id="tab-btn-cardapio">🍔 Cardápio</button>
    <button class="ptab" onclick="abrirTab('stats')" id="tab-btn-stats">📊 Resumo</button>
  </div>

  <div id="tab-pedidos" class="tab-content active">
    <div id="pedidos-list" class="pedidos-list">
      <div class="loading"><div class="spinner"></div>Carregando pedidos...</div>
    </div>
  </div>

  <div id="tab-cardapio" class="tab-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>Produtos</h3>
        <button class="btn-primary" onclick="abrirModalProduto()" style="width:auto; padding:8px 20px;">+ Novo</button>
    </div>
    <div id="prod-rows" class="prod-rows"></div>
  </div>

  <div id="tab-stats" class="tab-content">
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-produto">
  <div class="modal">
    <h3 id="modal-titulo" style="margin-bottom:15px">Novo produto</h3>
    <input type="hidden" id="prod-edit-id">
    <input type="text" id="prod-nome" class="form-input" placeholder="Nome do produto">
    <input type="text" id="prod-cat" class="form-input" placeholder="Categoria">
    <input type="number" id="prod-preco" class="form-input" placeholder="Preço R$" step="0.01">
    
    <div style="display:flex; gap:10px">
        <button class="logout-btn" onclick="fecharModal()" style="flex:1; padding:12px">Cancelar</button>
        <button class="btn-primary" onclick="salvarProduto()" id="btn-salvar-prod" style="flex:2">Salvar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hgjhnaxrbrbfngaobxvd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnamhuYXhyYnJiZm5nYW9ieHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzkwMTAsImV4cCI6MjA4OTE1NTAxMH0.riYYdgkXkUtwE5DRe7RNzhU7G16yeUA2xYncbYIpqME';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let lojaId = null;
let pedidos = [];
let produtos = [];

// CORREÇÃO: Função de login direta
async function fazerLogin() {
  document.getElementById('btn-login').textContent = 'Conectando...';
  await iniciarPainel();
}

function fazerLogout() {
  location.reload();
}

// CORREÇÃO: Adicionado async para evitar erros de sincronismo
async function iniciarPainel() {
  try {
    const { data: lojas, error } = await sb.from('lojas').select('*').limit(1);
    
    if (error) throw error;

    if (lojas && lojas.length > 0) {
      lojaId = lojas[0].id;
      document.getElementById('loja-nome-badge').textContent = lojas[0].nome;
    } else {
      // Cria loja padrão se não existir
      const { data: novaLoja } = await sb.from('lojas').insert({ nome: 'Minha Loja' }).select().single();
      lojaId = novaLoja.id;
      document.getElementById('loja-nome-badge').textContent = novaLoja.nome;
    }

    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-painel').classList.add('active');

    carregarPedidos();
    carregarProdutos();
  } catch (err) {
    alert("Erro ao conectar com Supabase. Verifique as Policies de RLS.");
    console.error(err);
  }
}

async function carregarPedidos() {
  const { data } = await sb.from('pedidos')
    .select('*, itens_pedido(*)')
    .eq('loja_id', lojaId)
    .order('criado_em', { ascending: false });
  pedidos = data || [];
  renderPedidos();
  atualizarStats();
}

function renderPedidos() {
  const list = document.getElementById('pedidos-list');
  if (pedidos.length === 0) {
    list.innerHTML = '<p style="text-align:center; color:#555">Nenhum pedido encontrado.</p>';
    return;
  }

  list.innerHTML = pedidos.map(p => `
    <div class="pedido-card">
      <div class="pedido-top">
        <span class="pedido-id">#${p.id.slice(0,5)}</span>
        <span class="status-pill s-${p.status}">${p.status}</span>
      </div>
      <div class="pedido-cliente"><strong>${p.nome_cliente}</strong></div>
      <div class="pedido-total-row">
        <span class="pedido-total">R$ ${Number(p.total).toFixed(2)}</span>
      </div>
    </div>
  `).join('');
}

async function carregarProdutos() {
  const { data } = await sb.from('produtos').select('*').eq('loja_id', lojaId);
  produtos = data || [];
  renderProdutos();
}

function renderProdutos() {
  const rows = document.getElementById('prod-rows');
  rows.innerHTML = produtos.map(p => `
    <div class="prod-row">
      <div class="prod-row-info">
        <div><strong>${p.nome}</strong></div>
        <div style="font-size:0.8rem; color:#888">${p.categoria}</div>
      </div>
      <div style="color:var(--brand); font-weight:bold">R$ ${Number(p.preco).toFixed(2)}</div>
    </div>
  `).join('');
}

async function salvarProduto() {
  const nome = document.getElementById('prod-nome').value;
  const cat = document.getElementById('prod-cat').value;
  const preco = document.getElementById('prod-preco').value;

  if(!nome || !preco) return alert("Preencha os campos!");

  await sb.from('produtos').insert({
    loja_id: lojaId,
    nome,
    categoria: cat,
    preco: parseFloat(preco),
    disponivel: true
  });

  fecharModal();
  carregarProdutos();
}

async function atualizarStats() {
    const totalVendas = pedidos.reduce((acc, p) => acc + Number(p.total), 0);
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-val">${pedidos.length}</div><div class="stat-label">Pedidos</div></div>
        <div class="stat-card"><div class="stat-val">R$ ${totalVendas.toFixed(2)}</div><div class="stat-label">Total</div></div>
    `;
}

function abrirTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tab-btn-' + tab).classList.add('active');
}

function abrirModalProduto() { document.getElementById('modal-produto').classList.add('show'); }
function fecharModal() { document.getElementById('modal-produto').classList.remove('show'); }
</script>
</body>
</html>
